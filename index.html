<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最高クオリティ ひっぱりアクション 自由操作＆個別コンボ版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border: 2px solid #333;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>

    <div id="game-container"></div>

    <script>
        // ==========================================
        // 調整用ゲームパラメータ（定数）
        // ==========================================
        const CONFIG = {
            WIDTH: 540,
            HEIGHT: 960,
            BOUNCE: 0.98,          // 跳ね返り係数（1.0に近づくほど勢いが死なない）
            DRAG: 20,              // 空気抵抗（停止をキビキビさせるため少し高めに設定）
            MAX_PULL: 150,         // 引っ張り上限距離(px)
            LAUNCH_POWER: 4.5,     // 発射速度倍率
            STOP_SPEED_THRESHOLD: 15, // この速度以下になったら強制停止して次のターンへ
            
            // 演出関連
            HIT_STOP_DURATION: 50, // ヒットストップの時間 (ミリ秒)
            SHAKE_INTENSITY: 0.01, // 画面揺れの強さ
            SHAKE_DURATION: 100,   // 画面揺れの時間 (ミリ秒)

            // バランス・ダメージ
            BASE_DAMAGE: 150,      
            LASER_DAMAGE: 500,     // 青のコンボ
            BOMB_DAMAGE: 650       // 緑のコンボ
        };

        class GameScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameScene' });
                this.isTurnActive = false;
                this.isDragging = false;
                this.hitStopping = false;
                this.selectedPlayer = null; // 現在引っ張っている最中のボール
                this.dragStartPoint = new Phaser.Math.Vector2();
            }

            preload() {
                this.createCircleTexture('player_main', 24, 0x00aaff, 0xffffff); // 自機（青）
                this.createCircleTexture('player_sub', 24, 0x00ff88, 0xffffff);  // 仲間（緑）
                this.createCircleTexture('enemy', 40, 0xff3333, 0xffbb00);      // 敵（赤）
                this.createParticleTexture();
            }

            create() {
                this.add.rectangle(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT, 0x121225).setOrigin(0);
                this.createGridBackground();

                this.physics.world.setBounds(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
                this.physics.world.gravity.set(0, 0);

                // 味方グループ
                this.players = this.physics.add.group({
                    bounceX: CONFIG.BOUNCE,
                    bounceY: CONFIG.BOUNCE,
                    dragX: CONFIG.DRAG,
                    dragY: CONFIG.DRAG,
                    collideWorldBounds: true
                });

                // 敵グループ
                this.enemies = this.physics.add.group({
                    bounceX: CONFIG.BOUNCE,
                    bounceY: CONFIG.BOUNCE,
                    dragX: CONFIG.DRAG,
                    dragY: CONFIG.DRAG,
                    collideWorldBounds: true
                });

                this.trajectoryGraphics = this.add.graphics();
                this.fxGraphics = this.add.graphics().setDepth(10); // レーザーや爆発用

                this.spawnCharacters();

                // 衝突判定の設定
                this.physics.add.collider(this.players, this.players, this.onPlayerCollide, undefined, this);
                this.physics.add.collider(this.players, this.enemies, this.onEnemyCollide, undefined, this);

                // タッチイベント
                this.input.on('pointerdown', this.onDragStart, this);
                this.input.on('pointermove', this.onDragMove, this);
                this.input.on('pointerup', this.onDragEnd, this);

                this.createPlayerTrails();
            }

            update() {
                // ターンアクティブ（移動中）の時だけ停止チェックを行う
                if (this.isTurnActive && !this.hitStopping) {
                    this.checkTurnEnd();
                }
            }

            spawnCharacters() {
                // 青いボール
                this.playerBlue = this.players.create(CONFIG.WIDTH / 2, CONFIG.HEIGHT - 150, 'player_main');
                this.playerBlue.setCircle(24);
                this.playerBlue.setData('comboType', 'laser'); // 青はレーザー
                this.playerBlue.setData('hasTriggeredCombo', false);

                // 緑のボール
                this.playerGreen = this.players.create(CONFIG.WIDTH / 2 - 120, CONFIG.HEIGHT - 250, 'player_sub');
                this.friendlyPlayer = this.playerGreen; // 後方互換・参照用
                this.playerGreen.setCircle(24);
                this.playerGreen.setData('comboType', 'bomb');  // 緑は爆発
                this.playerGreen.setData('hasTriggeredCombo', false);

                // 敵
                this.enemy = this.enemies.create(CONFIG.WIDTH / 2, 250, 'enemy');
                this.enemy.setCircle(40);
                this.enemy.setData('maxHp', 5000);
                this.enemy.setData('hp', 5000);
                this.enemy.setMass(2.5); 

                this.updateHpBar(this.enemy);
            }

            // ==========================================
            // 自由な引っ張り操作（青も緑も可）
            // ==========================================
            onDragStart(pointer) {
                if (this.isTurnActive) return; // 誰かが動いている間は引っ張れない

                this.selectedPlayer = null;

                // タップ位置に近い方の味方を探す（半径60px以内）
                this.players.getChildren().forEach((player) => {
                    const dist = Phaser.Math.Distance.Between(pointer.x, pointer.y, player.x, player.y);
                    if (dist < 60) {
                        this.selectedPlayer = player;
                    }
                });

                if (this.selectedPlayer) {
                    this.isDragging = true;
                    this.dragStartPoint.set(pointer.x, pointer.y);
                }
            }

            onDragMove(pointer) {
                if (!this.isDragging || !this.selectedPlayer) return;

                this.trajectoryGraphics.clear();

                let dx = pointer.x - this.dragStartPoint.x;
                let dy = pointer.y - this.dragStartPoint.y;
                let distance = Phaser.Math.Distance.Between(0, 0, dx, dy);

                if (distance > CONFIG.MAX_PULL) {
                    const angle = Phaser.Math.Angle.Between(0, 0, dx, dy);
                    dx = Math.cos(angle) * CONFIG.MAX_PULL;
                    dy = Math.sin(angle) * CONFIG.MAX_PULL;
                    distance = CONFIG.MAX_PULL;
                }

                const launchAngle = Phaser.Math.Angle.Between(0, 0, -dx, -dy);
                const ratio = distance / CONFIG.MAX_PULL;
                
                let color = 0x00aaff;
                if (ratio > 0.7) color = 0xff3333;
                else if (ratio > 0.3) color = 0xffaa00;

                const startX = this.selectedPlayer.x;
                const startY = this.selectedPlayer.y;
                const endX = startX + Math.cos(launchAngle) * distance;
                const endY = startY + Math.sin(launchAngle) * distance;

                this.trajectoryGraphics.lineStyle(6, color, 0.8);
                this.trajectoryGraphics.lineBetween(startX, startY, endX, endY);
                this.trajectoryGraphics.fillStyle(color, 1);
                this.trajectoryGraphics.beginPath();
                this.trajectoryGraphics.moveTo(endX, endY);
                this.trajectoryGraphics.lineTo(endX - 15 * Math.cos(launchAngle - Math.PI / 6), endY - 15 * Math.sin(launchAngle - Math.PI / 6));
                this.trajectoryGraphics.lineTo(endX - 15 * Math.cos(launchAngle + Math.PI / 6), endY - 15 * Math.sin(launchAngle + Math.PI / 6));
                this.trajectoryGraphics.closePath();
                this.trajectoryGraphics.fill();
            }

            onDragEnd(pointer) {
                if (!this.isDragging || !this.selectedPlayer) return;
                this.isDragging = false;
                this.trajectoryGraphics.clear();

                let dx = pointer.x - this.dragStartPoint.x;
                let dy = pointer.y - this.dragStartPoint.y;

                if (Phaser.Math.Distance.Between(0, 0, dx, dy) < 10) return;

                if (Phaser.Math.Distance.Between(0, 0, dx, dy) > CONFIG.MAX_PULL) {
                    const angle = Phaser.Math.Angle.Between(0, 0, dx, dy);
                    dx = Math.cos(angle) * CONFIG.MAX_PULL;
                    dy = Math.sin(angle) * CONFIG.MAX_PULL;
                }

                // 発射！全キャラのコンボフラグをリセット
                this.players.getChildren().forEach(p => p.setData('hasTriggeredCombo', false));

                this.selectedPlayer.setVelocity(-dx * CONFIG.LAUNCH_POWER, -dy * CONFIG.LAUNCH_POWER);
                this.isTurnActive = true;
            }

            // ==========================================
            // 衝突処理・友情コンボ分岐
            // ==========================================
            
            // 味方同士の衝突
            onPlayerCollide(obj1, obj2) {
                // めり込み防止の押し出し
                const angle = Phaser.Math.Angle.Between(obj2.x, obj2.y, obj1.x, obj1.y);
                obj1.x += Math.cos(angle) * 1.5;
                obj1.y += Math.sin(angle) * 1.5;
                obj2.x -= Math.cos(angle) * 1.5;
                obj2.y -= Math.sin(angle) * 1.5;

                // ぶつかられた側のコンボを発動する
                this.checkAndTriggerCombo(obj1);
                this.checkAndTriggerCombo(obj2);
            }

            checkAndTriggerCombo(player) {
                // すでにこのターンで発動済みならスキップ
                if (player.getData('hasTriggeredCombo')) return;

                // 動いている最中のキャラからはコンボは出ない（停止中のキャラに当たった時のみ発動）
                const speed = Phaser.Math.Distance.Between(0, 0, player.body.velocity.x, player.body.velocity.y);
                if (speed > CONFIG.STOP_SPEED_THRESHOLD) return;

                player.setData('hasTriggeredCombo', true);
                const type = player.getData('comboType');

                if (type === 'laser') {
                    this.triggerLaserCombo(player);
                } else if (type === 'bomb') {
                    this.triggerBombCombo(player);
                }
            }

            // 【青の友情】レーザーコンボ
            triggerLaserCombo(sourcePlayer) {
                if (!this.enemy || this.enemy.getData('hp') <= 0) return;

                const fromX = sourcePlayer.x;
                const fromY = sourcePlayer.y;
                const toX = this.enemy.x;
                const toY = this.enemy.y;

                this.tweens.addCounter({
                    from: 28,
                    to: 0,
                    duration: 350,
                    onUpdate: (tween) => {
                        const t = tween.getValue();
                        this.fxGraphics.clear();
                        if (t > 2) {
                            this.fxGraphics.lineStyle(t, 0x00aaff, 0.5); // 青ビーム
                            this.fxGraphics.lineBetween(fromX, fromY, toX, toY);
                            this.fxGraphics.lineStyle(t * 0.4, 0xffffff, 0.95);
                            this.fxGraphics.lineBetween(fromX, fromY, toX, toY);
                        }
                    },
                    onComplete: () => this.fxGraphics.clear()
                });

                this.applyDamageToEnemy(CONFIG.LASER_DAMAGE, 0x00aaff, true);
            }

            // 【緑の友情】爆発コンボ
            triggerBombCombo(sourcePlayer) {
                if (!this.enemy || this.enemy.getData('hp') <= 0) return;

                const bombX = sourcePlayer.x;
                const bombY = sourcePlayer.y;

                // 円形に広がる爆発の視覚演出
                this.tweens.addCounter({
                    from: 0,
                    to: 130, // 爆発の半径
                    duration: 400,
                    ease: 'Quad.easeOut',
                    onUpdate: (tween) => {
                        const r = tween.getValue();
                        this.fxGraphics.clear();
                        this.fxGraphics.fillStyle(0x00ff88, 0.3); // 緑の爆炎
                        this.fxGraphics.fillCircle(bombX, bombY, r);
                        this.fxGraphics.lineStyle(4, 0xffffff, 0.7);
                        this.fxGraphics.strokeCircle(bombX, bombY, r);
                    },
                    onComplete: () => this.fxGraphics.clear()
                });

                // 派手なスパークを撒き散らす
                this.spawnSpark(bombX, bombY, 0x00ff88, 30);

                // 敵が爆発の範囲（130px）に入っていればダメージ
                const dist = Phaser.Math.Distance.Between(bombX, bombY, this.enemy.x, this.enemy.y);
                if (dist <= 130 + 40) { // 爆発半径 + 敵のサイズ
                    this.applyDamageToEnemy(CONFIG.BOMB_DAMAGE, 0x00ff88, true);
                }
            }

            // プレイヤーと敵の衝突
            onEnemyCollide(player, enemy) {
                if (this.hitStopping) return;

                const contactX = (player.x + enemy.x) / 2;
                const contactY = (player.y + enemy.y) / 2;
                this.spawnSpark(contactX, contactY, 0xffaa00, 15);

                this.applyDamageToEnemy(CONFIG.BASE_DAMAGE, 0xffffff, false);

                // ヒットストップ & 画面シェイク
                this.hitStopping = true;
                const pVel = player.body.velocity.clone();
                const eVel = enemy.body.velocity.clone();

                player.setVelocity(0, 0);
                enemy.setVelocity(0, 0);
                this.physics.world.pause();

                this.cameras.main.shake(CONFIG.SHAKE_DURATION, CONFIG.SHAKE_INTENSITY);

                this.time.delayedCall(CONFIG.HIT_STOP_DURATION, () => {
                    this.physics.world.resume();
                    
                    const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
                    const speed = Math.max(pVel.length() * CONFIG.BOUNCE, 180); 
                    
                    player.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
                    enemy.setVelocity(-Math.cos(angle) * speed * 0.2, -Math.sin(angle) * speed * 0.2);
                    
                    this.hitStopping = false;
                });
            }

            // 敵への共通ダメージ処理
            applyDamageToEnemy(amount, textColor, isBig) {
                let hp = this.enemy.getData('hp');
                hp -= amount;
                this.enemy.setData('hp', hp);
                this.updateHpBar(this.enemy);
                this.showDamageText(this.enemy.x, this.enemy.y - 40, amount.toString(), textColor, isBig);
            }

            // ==========================================
            // 確実なターン終了判定ロジック
            // ==========================================
            checkTurnEnd() {
                let allStopped = true;

                // 味方も敵も、すべてのオブジェクトの速度を検証
                this.players.getChildren().forEach((char) => {
                    const speed = Phaser.Math.Distance.Between(0, 0, char.body.velocity.x, char.body.velocity.y);
                    if (speed > CONFIG.STOP_SPEED_THRESHOLD) {
                        allStopped = false;
                    } else {
                        char.setVelocity(0, 0); // 微小な揺れを完全にカット
                    }
                });

                this.enemies.getChildren().forEach((char) => {
                    const speed = Phaser.Math.Distance.Between(0, 0, char.body.velocity.x, char.body.velocity.y);
                    if (speed > CONFIG.STOP_SPEED_THRESHOLD) {
                        allStopped = false;
                    } else {
                        char.setVelocity(0, 0);
                    }
                });

                if (allStopped) {
                    this.isTurnActive = false; // 完全に静止したら次のターン（引っ張り許可）へ
                }
            }

            // ==========================================
            // 各種ビジュアルエフェクト
            // ==========================================
            createPlayerTrails() {
                this.players.getChildren().forEach((char) => {
                    const emitter = this.add.particles(0, 0, 'trail_particle', {
                        speed: 15,
                        scale: { start: 0.5, end: 0 },
                        alpha: { start: 0.6, end: 0 },
                        blendMode: 'ADD',
                        lifespan: 250,
                        frequency: 10
                    });
                    emitter.startFollow(char);

                    this.physics.world.on('worldstep', () => {
                        const speed = Phaser.Math.Distance.Between(0, 0, char.body.velocity.x, char.body.velocity.y);
                        if (speed < CONFIG.STOP_SPEED_THRESHOLD) emitter.stop();
                        else emitter.start();
                    });
                });
            }

            spawnSpark(x, y, color, count = 15) {
                const spark = this.add.particles(x, y, 'trail_particle', {
                    speed: { min: 100, max: 250 },
                    angle: { min: 0, max: 360 },
                    scale: { start: 0.6, end: 0 },
                    alpha: { start: 1, end: 0 },
                    blendMode: 'ADD',
                    lifespan: { min: 200, max: 400 },
                    maxParticles: count
                });
                spark.setDepth(6);
            }

            showDamageText(x, y, text, color, isBig = false) {
                const hexColor = '#' + color.toString(16).padStart(6, '0');
                const damageTxt = this.add.text(x, y, text, {
                    fontFamily: 'Arial Black',
                    fontSize: isBig ? '42px' : '26px',
                    color: hexColor,
                    stroke: '#000000',
                    strokeThickness: 6
                }).setOrigin(0.5).setDepth(20);

                this.tweens.add({
                    targets: damageTxt,
                    y: y - 70,
                    scale: { start: 1.6, end: 1.0 },
                    alpha: { start: 1, end: 0 },
                    duration: 650,
                    ease: 'Back.easeOut',
                    onComplete: () => damageTxt.destroy()
                });
            }

            updateHpBar(enemy) {
                let hpBar = enemy.getData('hpBar');
                if (!hpBar) {
                    hpBar = this.add.graphics().setDepth(5);
                    enemy.setData('hpBar', hpBar);
                }
                hpBar.clear();

                const currentHp = Math.max(0, enemy.getData('hp'));
                const ratio = currentHp / enemy.getData('maxHp');

                hpBar.fillStyle(0x222222, 0.8);
                hpBar.fillRect(enemy.x - 50, enemy.y - 65, 100, 8);

                const barColor = ratio > 0.3 ? 0x00ff00 : 0xff3333;
                hpBar.fillStyle(barColor, 1);
                hpBar.fillRect(enemy.x - 50, enemy.y - 65, 100 * ratio, 8);
            }

            createCircleTexture(key, radius, fillColor, strokeColor) {
                const graphic = this.make.graphics({ x: 0, y: 0, add: false });
                graphic.fillStyle(fillColor, 1);
                graphic.fillCircle(radius, radius, radius);
                graphic.lineStyle(3, strokeColor, 1);
                graphic.strokeCircle(radius, radius, radius - 1.5);
                graphic.generateTexture(key, radius * 2, radius * 2);
            }

            createParticleTexture() {
                const graphic = this.make.graphics({ x: 0, y: 0, add: false });
                graphic.fillStyle(0xffffff, 1);
                graphic.fillCircle(4, 4, 4);
                graphic.generateTexture('trail_particle', 8, 8);
            }
